specs:
  - "specs/**/*.md"

tickets:
  provider: jira
  project: "SCRUM"
  mapping:
    epic: h1
    story: h2
  labels:
    - "conduit-managed"

design:
  provider: figma
  file_id: "G43w1GZqcvVbUN0acd1pJW"
  significant_change_threshold:
    min_frames_added: 1
    min_frames_removed: 1
    min_text_chars_changed: 50
    track_top_level_only: true

ai:
  model: "claude-sonnet-4-6"
  breakdown:
    mode: "by_layer"

  ac_format:
    format: "given_when_then"
    include_background: false
    include_figma_links: false

sync:
  auto_update: false
  detect_drift: true
  state_file: ".conduit/state.json"
